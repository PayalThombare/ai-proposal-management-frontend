<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg512" cx="35%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#1E0442"/>
      <stop offset="100%" stop-color="#060010"/>
    </radialGradient>
    <radialGradient id="orb512" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D946EF"/>
      <stop offset="50%" stop-color="#9333EA" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6B21A8" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow512" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft512" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- BG -->
  <rect width="512" height="512" rx="112" fill="url(#bg512)"/>
  <!-- Orb -->
  <ellipse cx="330" cy="150" rx="160" ry="155" fill="url(#orb512)" opacity="0.5"/>
  <!-- Secondary glow ring -->
  <circle cx="330" cy="150" r="55" fill="none" stroke="#C084FC" stroke-width="1" opacity="0.2"/>
  <circle cx="330" cy="150" r="80" fill="none" stroke="#7C3AED" stroke-width="0.5" opacity="0.15"/>
  <!-- Document -->
  <rect x="90" y="140" width="240" height="290" rx="22" fill="none" stroke="#7C3AED" stroke-width="10"/>
  <rect x="90" y="140" width="240" height="290" rx="22" fill="#0D0020" opacity="0.6"/>
  <!-- Folded corner detail -->
  <path d="M256 140 L330 140 L330 214 Z" fill="#2D0060" opacity="0.7"/>
  <path d="M256 140 L256 214 L330 214" fill="none" stroke="#A78BFA" stroke-width="7"/>
  <!-- Doc content lines -->
  <rect x="118" y="236" width="180" height="8" rx="4" fill="#4C1D95" opacity="0.9"/>
  <rect x="118" y="260" width="150" height="8" rx="4" fill="#4C1D95" opacity="0.7"/>
  <rect x="118" y="284" width="168" height="8" rx="4" fill="#4C1D95" opacity="0.6"/>
  <rect x="118" y="308" width="130" height="8" rx="4" fill="#4C1D95" opacity="0.5"/>
  <rect x="118" y="332" width="155" height="8" rx="4" fill="#4C1D95" opacity="0.4"/>
  <!-- Hexagon AI node -->
  <polygon points="330,82 374,108 374,162 330,188 286,162 286,108" fill="#0A0018" stroke="#D946EF" stroke-width="8" filter="url(#glow512)"/>
  <!-- Inner hex -->
  <polygon points="330,100 362,118 362,154 330,172 298,154 298,118" fill="none" stroke="#9333EA" stroke-width="3" opacity="0.5"/>
  <!-- Pulsing center -->
  <circle cx="330" cy="135" r="22" fill="#E879F9" opacity="0.15" filter="url(#soft512)"/>
  <circle cx="330" cy="135" r="14" fill="#F0ABFC" opacity="0.9" filter="url(#glow512)"/>
  <!-- Circuit traces from node to doc -->
  <path d="M295 148 L272 148 L256 178" fill="none" stroke="#A78BFA" stroke-width="3" stroke-dasharray="6,4" opacity="0.6"/>
  <!-- Three circuit node dots -->
  <circle cx="272" cy="148" r="4" fill="#C084FC" opacity="0.8"/>
  <circle cx="256" cy="178" r="4" fill="#C084FC" opacity="0.6"/>
</svg>